name: Secret scan

on: [push, pull_request]

jobs:
  secret-scan:
    name: Detect secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets and fail on findings
        shell: python
        run: |
          import subprocess, json, sys, os
          try:
              # 1. Run a clean raw scan
              with open("current_scan.json", "w") as f:
                  subprocess.run(["detect-secrets", "scan", "--exclude-files", "checksums.sha256|lazy-lock.json|.*\\.template.*|\\.github/workflows/.*"], stdout=f, check=True)
              
              with open("current_scan.json") as f:
                  current = json.load(f)
              current_results = current.get("results", {})
              
              # 2. If no findings at all, we are perfectly clean!
              if not current_results:
                  print("No secrets detected")
                  sys.exit(0)
                  
              # 3. If no baseline file exists, fail on any findings
              if not os.path.exists(".secrets.baseline"):
                  count = sum(len(v) for v in current_results.values())
                  print(f"Found {count} potential secret(s) and no .secrets.baseline exists to ignore them.")
                  sys.exit(1)
                  
              # 4. Compare current scan findings against committed baseline
              with open(".secrets.baseline") as f:
                  baseline = json.load(f)
              baseline_results = baseline.get("results", {})
              
              new_findings = []
              for filepath, findings in current_results.items():
                  baseline_secrets = {f["hashed_secret"] for f in baseline_results.get(filepath, [])}
                  for f in findings:
                      if f["hashed_secret"] not in baseline_secrets:
                          new_findings.append((filepath, f["line_number"], f["type"]))
                          
              if new_findings:
                  print(f"Found {len(new_findings)} new/unreviewed secret(s) not in baseline:")
                  for filepath, line, stype in new_findings:
                      print(f"  - {filepath}:{line} ({stype})")
                  sys.exit(1)
                  
              print("No new secrets detected (all findings are acknowledged in baseline)")
          except Exception as e:
              print(f"Error checking secrets: {e}")
              sys.exit(1)
