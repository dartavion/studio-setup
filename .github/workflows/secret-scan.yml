name: Secret scan

on: [push, pull_request]

jobs:
  secret-scan:
    name: Detect secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets and fail on findings
        shell: python
        run: |
          import subprocess, json, sys
          try:
              with open(".secrets.baseline", "w") as f:
                  subprocess.run(["detect-secrets", "scan", "--exclude-files", "checksums.sha256|lazy-lock.json|.*\\.template.*"], stdout=f, check=True)
              with open(".secrets.baseline") as f:
                  b = json.load(f)
              results = b.get("results", {})
              count = sum(len(v) for v in results.values())
              if count > 0:
                  print(f"Found {count} potential secret(s). Review .secrets.baseline.")
                  sys.exit(1)
              print("No secrets detected")
          except Exception as e:
              print(f"Error checking secrets: {e}")
              sys.exit(1)
