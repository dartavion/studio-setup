name: Secret scan

on: [push, pull_request]

jobs:
  secret-scan:
    name: Detect secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets and fail on findings
        run: |
          set -euo pipefail
          detect-secrets scan -o .secrets.baseline
          python3 - <<'PY'
import json,sys
b=json.load(open('.secrets.baseline'))
results=b.get('results',{})
count=sum(len(v) for v in results.values())
if count>0:
    print(f'Found {count} potential secret(s). Review .secrets.baseline and update .secrets.baseline to ignore false positives.')
    sys.exit(1)
print('No secrets detected')
PY
